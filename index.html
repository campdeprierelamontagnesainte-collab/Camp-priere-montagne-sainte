<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp de Prière - La Montagne Sainte</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b3d91;
    color:white;
}

header{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url('assets/images/image1.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.logo{
    width:120px;
    border-radius:10px;
}

h1{
    font-size:50px;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    background:white;
    color:#0b3d91;
    text-decoration:none;
    font-weight:bold;
    border-radius:6px;
}

section{
    padding:60px 20px;
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}
</style>

</head>

<body>

<!-- 🔴 TEST IMAGE DIRECT -->
<h2>TEST IMAGE</h2>
<img src="test.png" width="200">

<header>
    <div>
        <img src="assets/images/logo.png" class="logo">

        <h1>Camp de Prière</h1>
        <p>La Montagne Sainte</p>

        <div>
            <a href="#contact" class="btn">Nous rejoindre</a>
            <a href="https://wa.me/22896097979" class="btn">WhatsApp</a>
        </div>
    </div>
</header>

<section>
    <h2>Galerie</h2>
    <div class="gallery">
        <img src="assets/images/image1.jpg">
        <img src="assets/images/image2.jpg">
        <img src="assets/images/image3.jpg">
    </div>
</section>

</body>
</html>
